services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trippier
      POSTGRES_PASSWORD: trippier
      POSTGRES_DB: trippier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trippier"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── auth-api — Go hot reload via air ────────────────────────────────────────

  auth-api:
    build:
      context: ./auth-api
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8081"
    volumes:
      - ./auth-api:/app          # mount source for hot reload
      - auth-api-tmp:/app/tmp    # keep compiled binary off the host mount
    env_file:
      - .env.example
    environment:
      AUTH_DATABASE_URL: postgres://trippier:trippier@postgres:5432/trippier?sslmode=disable
      AUTH_REDIS_URL: redis://redis:6379
      AUTH_INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-internal-secret}
      AUTH_SMTP_HOST: mailhog
      AUTH_APP_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── poi-api — Go hot reload via air ─────────────────────────────────────────

  poi-api:
    build:
      context: ./poi-api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./poi-api:/app
      - poi-api-tmp:/app/tmp
    env_file:
      - .env.example
    environment:
      POI_REDIS_URL: redis://redis:6379
      POI_AUTH_API_URL: http://auth-api:8081
      POI_INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-internal-secret}
      POI_LOG_LEVEL: debug
    depends_on:
      redis:
        condition: service_healthy
      auth-api:
        condition: service_started

  # ── itinerary-api — Python hot reload via uvicorn --reload ───────────────────

  itinerary-api:
    build:
      context: ./itinerary-api
    ports:
      - "8000:8000"
    volumes:
      - ./itinerary-api:/app
    env_file:
      - .env.example
    environment:
      POI_API_URL: http://poi-api:8080
      AUTH_API_URL: http://auth-api:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET:-change-me-internal-secret}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - poi-api
      - auth-api

  # ── frontend — bun dev with Vite HMR ────────────────────────────────────────

  frontend:
    image: oven/bun:1-alpine
    working_dir: /app
    ports:
      - "3000:3000"
      - "24678:24678"   # Vite HMR websocket
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
    environment:
      AUTH_API_URL: http://auth-api:8081
      POI_API_URL: http://poi-api:8080
      ITINERARY_API_URL: http://itinerary-api:8000
    command: sh -c "bun install --frozen-lockfile && bunx svelte-kit sync && bun run dev --host"
    depends_on:
      - auth-api
      - poi-api

volumes:
  auth-api-tmp:
  poi-api-tmp:
  frontend-modules:
