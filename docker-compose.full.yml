services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    restart: unless-stopped

  # ── Auth API (Go) ───────────────────────────────────────────────────────────

  auth-api:
    image: ghcr.io/trippier/auth-api:latest
    build:
      context: ./auth-api
    ports:
      - "${AUTH_API_PORT:-8081}:8081"
    env_file:
      - .env
    environment:
      AUTH_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      AUTH_REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_INTERNAL_SECRET: ${INTERNAL_SECRET}
      AUTH_SMTP_HOST: mailhog
      AUTH_SMTP_PORT: 1025
      AUTH_APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── POI API (Go) ────────────────────────────────────────────────────────────

  poi-api:
    image: ghcr.io/trippier/poi-api:latest
    build:
      context: ./poi-api
    ports:
      - "${POI_API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      POI_REDIS_URL: redis://redis:6379
      POI_AUTH_API_URL: http://auth-api:8081
      POI_INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      auth-api:
        condition: service_started
    restart: unless-stopped

  # ── Itinerary API (Python) ───────────────────────────────────────────────────

  itinerary-api:
    image: ghcr.io/trippier/itinerary-api:latest
    build:
      context: ./itinerary-api
    ports:
      - "${ITINERARY_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      POI_API_URL: http://poi-api:8080
      AUTH_API_URL: http://auth-api:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      - poi-api
      - auth-api
    restart: unless-stopped

  # ── Frontend (SvelteKit) ─────────────────────────────────────────────────────

  frontend:
    image: ghcr.io/trippier/frontend:latest
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      AUTH_API_URL: http://auth-api:8081
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      FRONTEND_POI_API_URL: http://poi-api:8080
      FRONTEND_ITINERARY_API_URL: http://itinerary-api:8000
    depends_on:
      - auth-api
      - poi-api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
