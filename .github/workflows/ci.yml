name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-go-poi:
    name: Test poi-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: poi-api/go.sum
      - run: go test -race ./...
        working-directory: poi-api

  test-go-auth:
    name: Test auth-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: auth-api/go.sum
      - run: go test -race ./...
        working-directory: auth-api

  test-python:
    name: Test itinerary-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt && pytest --tb=short
        working-directory: itinerary-api

  lint-go-poi:
    name: Lint poi-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: poi-api/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: poi-api

  lint-go-auth:
    name: Lint auth-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: auth-api/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64
          working-directory: auth-api

  lint-python:
    name: Lint itinerary-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt && ruff check . && mypy app
        working-directory: itinerary-api
