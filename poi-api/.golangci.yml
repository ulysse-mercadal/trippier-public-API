linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - godot
    - misspell
    - prealloc

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
  godot:
    scope: declarations
    capital: false

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
